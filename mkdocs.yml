site_name: MetalMercs Corepedia

theme:
  name: material
  logo: assets/mm_logo.png
  favicon: assets/favicon.png
  language: en
  custom_dir: docs/overrides

  palette:
    scheme: default
    primary: custom
    accent: custom

  features:
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social: []
  generator: false

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md

  - The Core:
      - Overview: core/overview.md
      - Star Regency: core/star-regency.md
      - StarCom: factions/starcom.md
      - History: core/history.md

  - Great Houses:
      - Helios Sovereignty: factions/helios-sovereignty.md
      - Starcrest Protectorate: factions/starcrest-protectorate.md
      - Confederate Vanguard Union: factions/confederate-vanguard-union.md
      - Omnisphere Imperium: factions/omnisphere-imperium.md
      - Orion Corporate: factions/orion-corporate.md
  
  - Mercenaries:
      - Overview: mercenaries/overview.md
      - Mercenary Guild: mercenaries/mercenary-guild.md
      - Greater Mercenary Units: mercenaries/greater-mercenary-units.md
      - Lesser Mercenary Units: mercenaries/lesser-mercenary-units.md

  - Technology:
      - technology/index.md
      - Mechs:
          - mechs/index.md
          - Mechs of the Core: mechs/mechs-of-the-core.md
          - Confederate Vanguard Union Mechs: mechs/confederate-vanguard-union-mechs.md
          - Helios Sovereignty Mechs: mechs/helios-sovereignty-mechs.md
          - Starcrest Protectorate Mechs: mechs/starcrest-protectorate-mechs.md
          - Omnisphere Imperium Mechs: mechs/omnisphere-imperium-mechs.md
          - Orion Corporate Mechs: mechs/orion-corporate-mechs.md
      - Weapons: technology/weapons.md
      - Space Warfare: technology/space-warfare.md
      - Jump Technology: technology/jump-drive.md

  - Military:
      - Military Organization: military/organization.md
      - Military Ranks: military/ranks.md
      - Fleet Structure: military/fleet-structure.md
  
  - Society:
      - Life in the Core: society/life-in-the-core.md
      - Cities of the Core: society/cities-of-the-core.md
      - Ruins of the Empire: society/ruins-of-the-empire.md
      - Mercenary Culture: society/mercenary-culture.md
      - Pirates and Raiders: society/pirates-and-raiders.md
      - CoreNet: society/core-net.md

  - Places:
      - Drake's Landing: places/drakes-landing.md
      - Titan Prime: places/titan-prime.md
    
  - People:
      - Jada Lytherius: people/jada-lytherius.md
      - Victor Hawkins: people/victor-hawkins.md
      - Deckard Nodack: people/deckard-nodack.md
      - Arthur Payne: people/arthur-payne.md
      
  - The Fringe:
      - Fringe Worlds: society/fringe-worlds.md
      - The Frontier: places/the-frontier.md
      - The Deep Fringe: society/deep-fringe.md
  
  - History & Religion:
      - History of Humanity: history/lost-history-of-humanity.md
      - Religions of the Core: history/religions.md
      - Other Beliefs: history/lesser-religions.md
